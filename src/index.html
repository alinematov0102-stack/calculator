<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="./output.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-[#4a0e4e] min-h-screen flex items-center justify-center p-4 font-sans text-white"
  >
    <div
      id="container"
      class="w-full max-w-md bg-[#6a1b9a] p-6 rounded-[30px] shadow-2xl flex flex-col items-center"
    >
      <div class="h-24 flex items-center justify-center mb-6 text-center">
        <p id="text" class="text-2xl font-bold transition-all duration-300">
          lorem ipsum dolor sit amet
        </p>
      </div>

      <div class="flex flex-wrap justify-center gap-3 mb-6 w-full">
        <button
          id="add-Btn1"
          class="flex-1 min-w-[80px] text-yellow-500 bg-white border-2 border-yellow-500 py-2 rounded-xl font-bold active:scale-90 transition"
        >
          Sariq
        </button>
        <button
          id="add-Btn2"
          class="flex-1 min-w-[80px] text-blue-900 bg-white border-2 border-blue-900 py-2 rounded-xl font-bold active:scale-90 transition"
        >
          Ko'k
        </button>
        <button
          id="add-Btn3"
          class="flex-1 min-w-[80px] text-red-600 bg-white border-2 border-red-600 py-2 rounded-xl font-bold active:scale-90 transition"
        >
          Qizil
        </button>
      </div>

      <div class="grid grid-cols-3 gap-3 mb-8 w-full">
        <button
          id="sm"
          class="py-2 border bg-white text-black rounded-lg active:bg-gray-200 transition"
        >
          Kichik
        </button>
        <button
          id="md"
          class="py-2 border bg-white text-black rounded-lg active:bg-gray-200 transition"
        >
          O'rta
        </button>
        <button
          id="lg"
          class="py-2 border bg-white text-black rounded-lg active:bg-gray-200 transition"
        >
          Katta
        </button>
      </div>

      <div class="flex items-center gap-3 mb-6 w-full">
        <input
          id="son1"
          class="w-full h-14 border-none bg-white rounded-2xl text-center text-black text-xl font-bold outline-none focus:ring-4 ring-yellow-400"
          type="number"
          placeholder="0"
        />
        <input
          id="son2"
          class="w-full h-14 border-none bg-white rounded-2xl text-center text-black text-xl font-bold outline-none focus:ring-4 ring-yellow-400"
          type="number"
          placeholder="0"
        />
      </div>

      <div
        id="result"
        class="w-full h-16 bg-white/20 rounded-2xl mb-6 flex items-center justify-center text-3xl font-mono border-2 border-dashed border-white/30"
      >
        0
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-3 gap-3 w-full">
        <button
          id="bt1"
          class="h-12 bg-white text-black rounded-xl font-bold hover:bg-yellow-400 transition active:scale-95"
        >
          Qo'shish
        </button>
        <button
          id="bt2"
          class="h-12 bg-white text-black rounded-xl font-bold hover:bg-yellow-400 transition active:scale-95"
        >
          Ayirish
        </button>
        <button
          id="bt3"
          class="h-12 bg-white text-black rounded-xl font-bold hover:bg-yellow-400 transition active:scale-95"
        >
          Bo'lish
        </button>
        <button
          id="bt4"
          class="h-12 bg-white text-black rounded-xl font-bold hover:bg-yellow-400 transition active:scale-95"
        >
          Ko'paytirish
        </button>
        <button
          id="bt5"
          class="h-12 col-span-2 sm:col-span-1 bg-red-500 text-white rounded-xl font-bold active:scale-95 transition"
        >
          Tozalash
        </button>
      </div>
    </div>

    <script src="calculator.js"></script>
  </body>
</html>
